# =============================================================================
# Collapse-print non-planar cylinder validation configuration
# =============================================================================
# Geometry comes from the measured slicing export (slicing.json); the values
# below mirror the paper's cylinder column. Element family (CG|DG) is selected
# here or overridden with `--element` on the runner. Inputs follow the
# framework convention: stresses in Pa, density in kg/m^3, g in mm/s^2,
# fracture energies in N/mm, and all lengths in mm.

# Element family for the displacement space: CG (continuous Lagrange) or
# DG (discontinuous, with cohesive/SIPG interface terms).
element: DG

geometry:
  type: nonplanar_cylinder
  slicing_json: slicing.json   # relative to validation/collapse_print/
  n_layers: 11                 # imaged layers (top sheet uses measured ring 11)
  layer_height: 9.0            # nominal h0 [mm]

mesh:
  n_span: 96
  n_thickness: 1
  n_length: 11                 # = n_layers (kept for framework helpers)
  partitioner: strip           # required for CG ghost-visibility safety

boundary_conditions:
  base_dirichlet_value: 0.0    # sheet-0 plate clamped via Nitsche ds(1)

material:
  tau_0: 210.0                 # initial static yield stress [Pa]
  A_thix: 2.0                  # structuration rate [Pa/s]
  mu_p: 6.0                    # plastic viscosity [Pa*s]
  gamma_c: 0.01                # critical strain [-]
  rho: 2000.0                  # density [kg/m^3]
  g: 9810.0                    # gravity [mm/s^2]

hardening:
  t_set: 3600.0                # setting time [s]
  E_inf: 0.06                  # hardened Young modulus cap [MPa] (gives E0 ~ 0.06 MPa)
  nu_fresh: 0.30               # Poisson ratio at birth [-] (lowered from 0.48:
                               # near-incompressible elasticity over-confined the
                               # base layer (oedometric lock, no vertical J2 flow);
                               # plastic incompressibility is still enforced by J2)
  nu_hard: 0.20                # hardened Poisson ratio [-]
  n_h: 1.0                     # hydration exponent after t_set [-]

interface:
  gamma_bonded_mult: 200.0     # intra-layer SIPG penalty (DG only)
  gamma_boundary_mult: 300.0   # Nitsche weak-Dirichlet penalty (CG and DG)
  G_Ic: 0.08                   # mode-I fracture energy [N/mm]
  G_IIc: 0.14                  # mode-II fracture energy [N/mm]
  eta_BK: 1.5                  # Benzeggagh-Kenane exponent [-]
  nozzle_pressure: 40000.0     # deposition pressure [Pa] (40 kPa)
  residual_stiffness_ratio: 0.05
  K_min_mult: 0.1
  # This mesh's facet ordering inverts the raw cohesive normal (interpenetration
  # reads as jump_n > 0); flip it so delta_n > 0 is OPENING and the contact
  # branch actually engages. Verified by the open/close-branch energy test.
  cohesive_normal_flip: true
  # Bonded-DG control. When true, inter-layer facets use the same fully
  # bonded SIPG coupling as intra-layer facets instead of the cohesive law.
  # The runner also exposes this as --bonded-control.
  bonded_only: false
  # Compressive contact penalty on the closing branch of the inter-layer law:
  # K_contact = max(K_n, gamma_contact_mult * E/h). Keeps bonded layers from
  # sinking through each other when the weak cohesive K_n << bulk E/h. The
  # tensile bond strength/damage (K_n, G_Ic) are unaffected.
  gamma_contact_mult: 200.0

activation:
  tcp_speed: 50.0              # tool-center-point speed [mm/s] (robot value)
  sharpness: 30.0              # tanh ramp steepness [1/s]; width << one segment
  alpha_min: 1.0e-10           # inactive-cell stiffness multiplier [-]

solver:
  max_iterations: 200
  rtol: 1.0e-5
  atol: 1.0e-10
  active_dof_reduction: false  # OFF for both CG and DG (cost-comparison parity)
  linear_solver: direct        # direct (MUMPS) | iterative (GMRES+ASM/ILU)
  direct:
    mumps_icntl_14: 200
    out_of_core: false
  iterative:
    rtol: 1.0e-8
    atol: 1.0e-12
    max_it: 2000
    restart: 200

time_stepping:
  n_steps: 150                 # uniform grid; layer coverage times are inserted
  max_steps: 0                 # 0 = run all (set for smoke tests)
  start_offset: 0.0
  end_multiplier: 1.0

# Front-arc sampling sector (camera-visible side) for the sim-vs-video
# comparison. Settlement is near-axisymmetric so the full-ring column is the
# robust comparator; the front arc emulates the single-camera view.
front_arc:
  center_deg: -90.0            # azimuth direction facing the camera
  half_width_deg: 60.0         # half-sector (120 deg total)

checkpoint:
  save_every: 25
  resume_enabled: false
  directory: paper/output/collapse_print/checkpoints

output:
  directory: paper/output/collapse_print/runs
  displacement_file: ""
  cell_data_file: ""
  log_file: ""

mesh_quality:
  enabled: true
  aspect_ratio_threshold: 10.0
  min_scaled_jacobian: 0.1
  jacobian_near_zero_tol: 1.0e-10
  volume_variation_threshold: 20.0
  max_skewness: 0.5
  max_warping: 0.1
  fail_on_negative_jacobian: true

debug: {}
